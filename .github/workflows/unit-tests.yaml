name: Unit tests

on:
  workflow_call:
    secrets:
      yaxi-api-key:
        required: false
      yaxi-key-id:
        required: false
      routex-url:
        required: false

permissions: {}

jobs:
  test:
    name: ${{ matrix.triple }} ${{ matrix.preset }}
    runs-on: windows-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: pwsh
    strategy:
      fail-fast: false
      matrix:
        include:
          - { triple: x86_64-pc-windows-msvc, preset: msvc-debug,   vcvars: amd64 }
          - { triple: x86_64-pc-windows-msvc, preset: msvc-release, vcvars: amd64 }
          - { triple: x86_64-pc-windows-msvc, preset: msvc-asan,    vcvars: amd64 }
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-${{ matrix.triple }}
          path: artifacts

      - name: Restore target/ layout
        run: |
          New-Item -ItemType Directory -Path "target/${{ matrix.triple }}" -Force | Out-Null
          Move-Item artifacts/* "target/${{ matrix.triple }}/" -Force

      - name: Configure MSVC environment
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsRoot  = & $vswhere -latest -products * -property installationPath
          $vcvars  = Join-Path $vsRoot 'VC\Auxiliary\Build\vcvarsall.bat'

          $before = @{}
          Get-ChildItem env: | ForEach-Object { $before[$_.Name] = $_.Value }

          $lines = & cmd /c "`"$vcvars`" ${{ matrix.vcvars }} >NUL && set"
          foreach ($line in $lines) {
              if ($line -match '^([^=]+)=(.*)$') {
                  $name  = $Matches[1]
                  $value = $Matches[2]
                  if ($before[$name] -ne $value) {
                      "$name=$value" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
                  }
              }
          }

      - name: Configure
        working-directory: tests/unit
        run: |
          cmake --preset ${{ matrix.preset }} `
              -DYAXI_BUILD_RUST_LIB=OFF `
              -DYAXI_CARGO_TARGET=${{ matrix.triple }}

      - name: Build
        working-directory: tests/unit
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        working-directory: tests/unit
        env:
          YAXI_API_KEY: ${{ secrets.yaxi-api-key }}
          YAXI_KEY_ID:  ${{ secrets.yaxi-key-id }}
          ROUTEX_URL:   ${{ secrets.routex-url }}
        run: ctest --preset ${{ matrix.preset }}
